name: build-packages

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  linux-x86:
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      SC_R_PORTABLE_BASE_URL: https://github.com/dusadrian/binaries/releases/download/R-4.5.3
      SC_GITHUB_TOKEN: ${{ secrets.SC_R_PORTABLE_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Prepare bundled R runtime
        run: npm run prepare:r-portable

      - name: Build TypeScript output
        run: npm run build

      - name: Build Electron app (Linux x86)
        run: npx electron-builder --linux AppImage deb --x64 --publish never

      - name: Rename Linux artifacts
        run: npm run rename:linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86-build
          path: |
            build/output/*.AppImage
            build/output/*.deb
          if-no-files-found: error

  windows-x86:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      SC_R_PORTABLE_BASE_URL: https://github.com/dusadrian/binaries/releases/download/R-4.5.3
      SC_GITHUB_TOKEN: ${{ secrets.SC_R_PORTABLE_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Prepare bundled R runtime
        run: npm run prepare:r-portable

      - name: Build TypeScript output
        run: npm run build

      - name: Build Electron app (Windows x86)
        run: npx electron-builder --win nsis portable --x64 --publish never

      - name: Rename Windows artifacts
        run: npm run rename:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86-build
          path: |
            build/output/*.exe
            build/output/*.zip
          if-no-files-found: error

  publish-release:
    runs-on: ubuntu-22.04
    needs:
      - linux-x86
      - windows-x86

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-x86-build
          path: release-assets/linux-x86

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-x86-build
          path: release-assets/windows-x86

      - name: Resolve release metadata
        id: release
        run: |
          echo "tag=latest" >> "$GITHUB_OUTPUT"
          echo "name=Latest build" >> "$GITHUB_OUTPUT"

      - name: Publish assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.release.outputs.name }}
          generate_release_notes: false
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          overwrite_files: true
          append_body: false
          make_latest: false
          files: |
            release-assets/linux-x86/*
            release-assets/windows-x86/*
